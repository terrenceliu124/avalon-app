# fly.toml — update "app" to your chosen app name after running fly launch
app = "avalon-app"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"   # keep alive — in-memory state would be lost on shutdown
  auto_start_machines = true
  min_machines_running = 1

[deploy]
  strategy = "immediate"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
